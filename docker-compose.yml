services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: love-chronicle-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: ${POSTGRES_DB:-love_chronicle}
      POSTGRES_USER: ${POSTGRES_USER:-love_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-please_change_me}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-love_user} -d ${POSTGRES_DB:-love_chronicle}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: love-chronicle-backend
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-love_chronicle}
      POSTGRES_USER: ${POSTGRES_USER:-love_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-please_change_me}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-please_change_this_secret}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-30}
      ME_USERNAME: ${ME_USERNAME:-lxq}
      ME_PASSWORD: ${ME_PASSWORD:-xiao}
      HER_USERNAME: ${HER_USERNAME:-wly}
      HER_PASSWORD: ${HER_PASSWORD:-0717}
      ZS_USERNAME: ${ZS_USERNAME:-zs}
      ZS_PASSWORD: ${ZS_PASSWORD:-0229}
      TZ: Asia/Shanghai
      AMAP_WEB_SERVICE_KEY: ${AMAP_WEB_SERVICE_KEY:-}
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      CLIP_IMAGE_MODEL: ${CLIP_IMAGE_MODEL:-sentence-transformers/clip-ViT-B-32}
      CLIP_TEXT_MODEL: ${CLIP_TEXT_MODEL:-sentence-transformers/clip-ViT-B-32-multilingual-v1}
    ports:
      - "${BACKEND_PORT:-18080}:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - hf_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-18080}
        VITE_AMAP_JS_KEY: ${AMAP_JS_KEY:-}
    container_name: love-chronicle-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-18080}
      VITE_AMAP_JS_KEY: ${AMAP_JS_KEY:-}
    ports:
      - "${FRONTEND_PORT:-15173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  hf_cache:
